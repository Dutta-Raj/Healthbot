services:
  - type: web
    name: medical-chatbot
    runtime: python
    repo: https://github.com/YOUR_USERNAME/medical-chatbot
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn medical_bot_final:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: KAFKA_ENABLED
        value: false

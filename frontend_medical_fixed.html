<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical RAG Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }
        .sidebar {
            width: 320px;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .sidebar-header h3 { font-size: 18px; margin-bottom: 10px; }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .conversation-item {
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            background: #f8f9fa;
            position: relative;
        }
        .conversation-item:hover { background: #e9ecef; }
        .conversation-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .conversation-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .conversation-time { font-size: 10px; opacity: 0.7; }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { color: #667eea; }
        .logout-btn {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { text-align: right; }
        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.6; }
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #ddd;
        }
        .input-container {
            display: flex;
            gap: 10px;
        }
        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            resize: none;
            font-family: inherit;
        }
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .typing-indicator {
            display: none;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 15px;
            width: fit-content;
            margin-bottom: 10px;
        }
        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .disclaimer {
            font-size: 10px;
            text-align: center;
            padding: 10px;
            color: #666;
            border-top: 1px solid #eee;
            background: white;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>🏥 Medical RAG Chatbot</h3>
            <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
        </div>
        <div class="conversations-list" id="conversationsList"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <h2 id="currentChatTitle">Medical Assistant</h2>
            <div><span id="currentUsername"></span> <button class="logout-btn" onclick="logout()">Logout</button></div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="typing-indicator" id="typingIndicator">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>
            <div class="input-container">
                <textarea class="message-input" id="messageInput" placeholder="Ask medical questions only... (e.g., blood pressure, diabetes, headache)" rows="2"></textarea>
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
        <div class="disclaimer">⚠️ Medical information only - Consult a doctor for personalized advice</div>
    </div>
</div>

<div id="authContainer" style="display:flex; justify-content:center; align-items:center; height:100vh; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div style="background:white; padding:40px; border-radius:20px; width:350px;">
        <h2 style="text-align:center; color:#667eea;">Login to Medical Bot</h2>
        <input type="text" id="loginUsername" placeholder="Username" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
        <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
        <button onclick="login()" style="width:100%; padding:12px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:10px;">Login</button>
        <p style="text-align:center; margin-top:15px;">Demo: ab / ab123</p>
    </div>
</div>

<script>
let authToken = null;
let currentUser = null;
let currentSessionId = null;
let conversations = [];

const API_URL = 'http://localhost:8000';

document.getElementById('messageInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function login() {
    const username = document.getElementById('loginUsername').value || 'ab';
    const password = document.getElementById('loginPassword').value || 'ab123';
    
    try {
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (response.ok) {
            authToken = data.access_token;
            currentUser = data.username;
            localStorage.setItem('token', authToken);
            localStorage.setItem('user', currentUser);
            document.getElementById('currentUsername').innerText = currentUser;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            createNewChat();
        } else { alert('Login failed: ' + data.detail); }
    } catch(e) { alert('Error: ' + e.message); }
}

function logout() {
    authToken = null;
    currentUser = null;
    localStorage.clear();
    document.getElementById('authContainer').style.display = 'flex';
    document.getElementById('appContainer').style.display = 'none';
}

function createNewChat() {
    currentSessionId = 'session_' + Date.now();
    document.getElementById('messagesArea').innerHTML = '';
    addMessage('bot', 'Hello! I\'m a medical assistant. I can answer questions about blood pressure, diabetes, headaches, heart health, and more. What would you like to know?');
    
    // Add to sidebar
    conversations.unshift({ id: currentSessionId, title: 'New Chat', timestamp: new Date().toISOString() });
    renderConversations();
}

function renderConversations() {
    const container = document.getElementById('conversationsList');
    container.innerHTML = conversations.map(conv => `
        <div class="conversation-item" onclick="loadConversation('${conv.id}')">
            <div class="conversation-title">${conv.title}</div>
            <div class="conversation-time">${formatTime(conv.timestamp)}</div>
        </div>
    `).join('');
}

async function loadConversation(sessionId) {
    currentSessionId = sessionId;
    try {
        const response = await fetch(`${API_URL}/history/${sessionId}`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const data = await response.json();
        const messagesArea = document.getElementById('messagesArea');
        messagesArea.innerHTML = '';
        if (data.history && data.history.length > 0) {
            data.history.forEach(msg => {
                addMessage('user', msg.message, msg.timestamp);
                addMessage('bot', msg.response, msg.timestamp);
            });
        }
    } catch(e) { console.log('Error loading history'); }
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message || !authToken) return;
    
    addMessage('user', message);
    input.value = '';
    document.getElementById('typingIndicator').style.display = 'block';
    
    try {
        const response = await fetch(`${API_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
            body: JSON.stringify({ message, session_id: currentSessionId })
        });
        const data = await response.json();
        document.getElementById('typingIndicator').style.display = 'none';
        addMessage('bot', data.response);
        
        // Update conversation title if needed
        const conv = conversations.find(c => c.id === currentSessionId);
        if (conv && conv.title === 'New Chat') {
            conv.title = message.substring(0, 30) + (message.length > 30 ? '...' : '');
            renderConversations();
        }
    } catch(e) {
        document.getElementById('typingIndicator').style.display = 'none';
        addMessage('bot', 'Sorry, I encountered an error. Please try again.');
    }
}

function addMessage(role, text, timestamp) {
    const messagesArea = document.getElementById('messagesArea');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
    div.innerHTML = `<div class="message-content">${escapeHtml(text)}<div class="message-time">${time}</div></div>`;
    messagesArea.appendChild(div);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} min ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)} hours ago`;
    return date.toLocaleDateString();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Check saved session
const savedToken = localStorage.getItem('token');
if (savedToken) {
    authToken = savedToken;
    currentUser = localStorage.getItem('user');
    document.getElementById('currentUsername').innerText = currentUser;
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
    createNewChat();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot AI - 3D Medical Assistant</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Three.js for 3D effects -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            color: #fff;
        }

        /* 3D Canvas Background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Glassmorphism Container */
        .glass-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            backdrop-filter: blur(0px);
        }

        /* Auth Modal */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.5s ease;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px;
            width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: floatIn 0.6s ease;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-card h2 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .toggle-link {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.6);
        }

        .toggle-link a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        /* Main App Layout */
        .app-layout {
            display: none;
            width: 100%;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .conv-item {
            padding: 14px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .conv-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .conv-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .conv-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            padding-right: 35px;
        }

        .conv-time {
            font-size: 11px;
            opacity: 0.5;
        }

        .conv-menu {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .conv-item:hover .conv-menu {
            opacity: 1;
        }

        .conv-dropdown {
            position: absolute;
            right: 12px;
            top: 80%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            min-width: 120px;
            display: none;
            z-index: 100;
        }

        .conv-dropdown.show {
            display: block;
        }

        .conv-dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 13px;
        }

        .conv-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .conv-dropdown-item.delete {
            color: #ff6b6b;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .chat-header {
            padding: 20px 32px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .username {
            opacity: 0.8;
        }

        .logout-btn {
            padding: 8px 20px;
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 12px;
            color: #ff6b6b;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.3);
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .message {
            margin-bottom: 24px;
            animation: messageAppear 0.4s ease;
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            text-align: right;
        }

        .bot-message {
            text-align: left;
        }

        .message-bubble {
            display: inline-block;
            max-width: 70%;
            padding: 14px 20px;
            border-radius: 24px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
        }

        .user-message .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-right-radius: 6px;
        }

        .bot-message .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 6px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 6px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: fit-content;
            margin-bottom: 20px;
        }

        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 3px;
            animation: typingBounce 1.4s infinite;
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        /* Input Area */
        .input-area {
            padding: 20px 32px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none;
            transition: all 0.3s;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            width: 380px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .cancel-btn { background: #6c757d; color: white; }
        .confirm-btn { background: #dc3545; color: white; }
        .rename-confirm { background: #28a745; color: white; }

        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        .error-msg { background: rgba(220, 53, 69, 0.2); color: #ff6b6b; }
        .success-msg { background: rgba(40, 167, 69, 0.2); color: #51cf66; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="auth-card">
            <h2>🏥 MediBot AI</h2>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            <div id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                </div>
                <button class="auth-btn" onclick="login()">Login</button>
                <div class="toggle-link">New here? <a onclick="showRegister()">Create account</a></div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="Choose username">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Email address">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create password">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm password">
                </div>
                <button class="auth-btn" onclick="register()">Register</button>
                <div class="toggle-link">Already have an account? <a onclick="showLogin()">Login</a></div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="app-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">MediBot AI</div>
                <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
            </div>
            <div class="conv-list" id="convList"></div>
        </div>
        <div class="main-chat">
            <div class="chat-header">
                <h2 id="chatTitle">Medical Assistant</h2>
                <div class="user-info">
                    <span class="username" id="username"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            <div class="messages-area" id="messages"></div>
            <div class="input-area">
                <div class="typing-indicator" id="typingIndicator">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
                <div class="input-container">
                    <textarea class="message-input" id="messageInput" placeholder="Ask me anything about health..." rows="1"></textarea>
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="renameModal" class="modal"><div class="modal-content"><h3>Rename Conversation</h3><input id="renameInput" placeholder="New name"><div class="modal-buttons"><button class="cancel-btn" onclick="closeRename()">Cancel</button><button class="rename-confirm" onclick="confirmRename()">Rename</button></div></div></div>
    <div id="deleteModal" class="modal"><div class="modal-content"><h3>Delete Conversation</h3><p>Delete this conversation?</p><div class="modal-buttons"><button class="cancel-btn" onclick="closeDelete()">Cancel</button><button class="confirm-btn" onclick="confirmDelete()">Delete</button></div></div></div>

    <script type="module">
        // Three.js 3D Background
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 200;
            posArray[i+1] = (Math.random() - 0.5) * 100;
            posArray[i+2] = (Math.random() - 0.5) * 50 - 20;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.2,
            color: 0x667eea,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        
        // Floating orbs
        const orbGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const orbMaterial = new THREE.MeshStandardMaterial({
            color: 0x667eea,
            emissive: 0x667eea,
            emissiveIntensity: 0.3,
            metalness: 0.8,
            roughness: 0.2
        });
        
        const orbs = [];
        for(let i = 0; i < 8; i++) {
            const orb = new THREE.Mesh(orbGeometry, orbMaterial);
            orb.position.x = (Math.random() - 0.5) * 40;
            orb.position.y = (Math.random() - 0.5) * 30;
            orb.position.z = (Math.random() - 0.5) * 20 - 10;
            orb.scale.setScalar(Math.random() * 0.8 + 0.3);
            scene.add(orb);
            orbs.push(orb);
        }
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);
        
        const backLight = new THREE.PointLight(0x667eea, 0.5);
        backLight.position.set(0, 0, -10);
        scene.add(backLight);
        
        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;
            
            particlesMesh.rotation.y = time * 0.05;
            particlesMesh.rotation.x = Math.sin(time * 0.1) * 0.1;
            
            orbs.forEach((orb, i) => {
                orb.position.x += Math.sin(time * 0.5 + i) * 0.005;
                orb.position.y += Math.cos(time * 0.4 + i) * 0.005;
                orb.rotation.x += 0.01;
                orb.rotation.y += 0.01;
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>

    <script>
        const API_URL = window.location.origin;
        let token = null, user = null, currentSession = null, conversations = [], pendingId = null;

        // Auto-resize textarea
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        textarea.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!username || !email || !password) { showError('Please fill all required fields'); return; }
            if (password !== confirm) { showError('Passwords do not match'); return; }
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, full_name: username })
                });
                const data = await res.json();
                if (res.ok) { showSuccess('Registration successful! Please login.'); showLogin(); }
                else { showError(data.detail || 'Registration failed'); }
            } catch(e) { showError('Error: ' + e.message); }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { showError('Please enter username and password'); return; }
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    user = data.username;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', user);
                    document.getElementById('username').innerText = user;
                    document.getElementById('authModal').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'flex';
                    loadConversations();
                    newChat();
                } else { showError(data.detail || 'Invalid credentials'); }
            } catch(e) { showError('Error: ' + e.message); }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            hideMessages();
        }
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            hideMessages();
        }
        function showError(msg) { const d = document.getElementById('errorMsg'); d.textContent = msg; d.style.display = 'block'; setTimeout(() => d.style.display = 'none', 3000); }
        function showSuccess(msg) { const d = document.getElementById('successMsg'); d.textContent = msg; d.style.display = 'block'; setTimeout(() => d.style.display = 'none', 3000); }
        function hideMessages() { document.getElementById('errorMsg').style.display = 'none'; document.getElementById('successMsg').style.display = 'none'; }

        function loadConversations() { let saved = localStorage.getItem(`conv_${user}`); if(saved) conversations = JSON.parse(saved); renderConvs(); }
        function saveConvs() { localStorage.setItem(`conv_${user}`, JSON.stringify(conversations)); }

        function renderConvs() {
            const container = document.getElementById('convList');
            container.innerHTML = conversations.map(c => `
                <div class="conv-item ${c.id === currentSession ? 'active' : ''}" onclick="selectChat('${c.id}')">
                    <div class="conv-title">${escapeHtml(c.title)}</div>
                    <div class="conv-time">${formatTime(c.timestamp)}</div>
                    <div class="conv-menu" onclick="event.stopPropagation(); toggleMenu('${c.id}')">⋮</div>
                    <div class="conv-dropdown" id="menu_${c.id}">
                        <div class="conv-dropdown-item" onclick="event.stopPropagation(); showRename('${c.id}')">✏️ Rename</div>
                        <div class="conv-dropdown-item delete" onclick="event.stopPropagation(); showDelete('${c.id}')">🗑️ Delete</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleMenu(id) {
            const menu = document.getElementById(`menu_${id}`);
            document.querySelectorAll('.conv-dropdown').forEach(m => { if(m !== menu) m.classList.remove('show'); });
            menu.classList.toggle('show');
        }

        function showRename(id) { pendingId = id; document.getElementById('renameModal').style.display = 'flex'; }
        function showDelete(id) { pendingId = id; document.getElementById('deleteModal').style.display = 'flex'; }
        function closeRename() { document.getElementById('renameModal').style.display = 'none'; pendingId = null; document.getElementById('renameInput').value = ''; }
        function closeDelete() { document.getElementById('deleteModal').style.display = 'none'; pendingId = null; }

        function confirmRename() {
            let newName = document.getElementById('renameInput').value;
            if(pendingId && newName) {
                let conv = conversations.find(c => c.id === pendingId);
                if(conv) conv.title = newName;
                saveConvs(); renderConvs();
                if(currentSession === pendingId) document.getElementById('chatTitle').innerText = newName;
            }
            closeRename();
        }

        function confirmDelete() {
            if(pendingId) {
                let idx = conversations.findIndex(c => c.id === pendingId);
                if(idx !== -1) conversations.splice(idx, 1);
                saveConvs();
                if(currentSession === pendingId) conversations.length ? selectChat(conversations[0].id) : newChat();
                else renderConvs();
            }
            closeDelete();
        }

        async function selectChat(id) {
            currentSession = id;
            renderConvs();
            document.getElementById('chatTitle').innerText = conversations.find(c => c.id === id)?.title || 'Chat';
            document.getElementById('messages').innerHTML = '';
            try {
                let res = await fetch(`${API_URL}/history/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                let data = await res.json();
                if(data.history) data.history.forEach(msg => {
                    addMessage('user', msg.message, msg.timestamp);
                    addMessage('bot', msg.response, msg.timestamp);
                });
            } catch(e) { console.log(e); }
        }

        async function newChat() {
            currentSession = 's_' + Date.now();
            conversations.unshift({ id: currentSession, title: 'New Chat', timestamp: new Date().toISOString() });
            saveConvs(); renderConvs();
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chatTitle').innerText = 'New Chat';
            addMessage('bot', 'Hello! I\'m MediBot AI, your intelligent medical assistant. I provide real-time AI-powered health information. What health concern can I help with today?');
        }

        let isStreaming = false;
        let currentStreamingDiv = null;
        let streamingContent = "";

        async function streamResponse(text) {
            const messagesArea = document.getElementById('messages');
            if (!currentStreamingDiv) {
                currentStreamingDiv = document.createElement('div');
                currentStreamingDiv.className = 'message bot-message';
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                currentStreamingDiv.appendChild(bubble);
                messagesArea.appendChild(currentStreamingDiv);
                streamingContent = "";
            }
            
            const bubble = currentStreamingDiv.querySelector('.message-bubble');
            
            for (let i = streamingContent.length; i < text.length; i++) {
                streamingContent += text[i];
                bubble.innerHTML = escapeHtml(streamingContent).replace(/\n/g, '<br>');
                messagesArea.scrollTop = messagesArea.scrollHeight;
                await new Promise(r => setTimeout(r, 10));
            }
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.innerText = new Date().toLocaleTimeString();
            currentStreamingDiv.appendChild(timeDiv);
            currentStreamingDiv = null;
            streamingContent = "";
        }

        async function sendMessage() {
            if (isStreaming) return;
            let input = document.getElementById('messageInput');
            let msg = input.value.trim();
            if (!msg) return;
            
            addMessage('user', msg);
            input.value = '';
            input.style.height = 'auto';
            
            isStreaming = true;
            document.getElementById('typingIndicator').style.display = 'flex';
            
            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: msg, session_id: currentSession })
                });
                const data = await res.json();
                document.getElementById('typingIndicator').style.display = 'none';
                await streamResponse(data.response);
                
                let conv = conversations.find(c => c.id === currentSession);
                if(conv && conv.title === 'New Chat') {
                    conv.title = msg.substring(0, 30) + (msg.length > 30 ? '...' : '');
                    saveConvs(); renderConvs();
                    document.getElementById('chatTitle').innerText = conv.title;
                }
            } catch(e) {
                document.getElementById('typingIndicator').style.display = 'none';
                addMessage('bot', 'Sorry, I encountered an error. Please try again.');
            } finally {
                isStreaming = false;
            }
        }

        function addMessage(role, text, time) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
            const timestamp = time ? new Date(time).toLocaleTimeString() : new Date().toLocaleTimeString();
            div.innerHTML = `<div class="message-bubble">${escapeHtml(text).replace(/\n/g, '<br>')}<div class="message-time">${timestamp}</div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(ts) {
            const date = new Date(ts), now = new Date(), diff = now - date;
            if(diff < 60000) return 'Just now';
            if(diff < 3600000) return `${Math.floor(diff/60000)} min ago`;
            if(diff < 86400000) return `${Math.floor(diff/3600000)} hours ago`;
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const savedToken = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if(savedToken && savedUser) {
            token = savedToken;
            user = savedUser;
            document.getElementById('username').innerText = user;
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            loadConversations();
            newChat();
        }
    </script>
</body>
</html>

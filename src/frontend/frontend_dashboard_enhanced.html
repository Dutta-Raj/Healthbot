<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthBot AI - Intelligent Medical Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Auth Container */
        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.5s ease;
        }

        .auth-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-box h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.3);
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }

        .auth-box button:hover {
            transform: translateY(-2px);
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .auth-switch a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
        }

        /* Main App Container */
        .app-container {
            display: none;
            height: 100vh;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .conversation-item {
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background: #f8f9fa;
        }

        .conversation-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .conversation-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .conversation-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conversation-time {
            font-size: 10px;
            opacity: 0.7;
        }

        .conversation-actions {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            gap: 8px;
            background: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .conversation-item:hover .conversation-actions {
            display: flex;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #e9ecef;
        }

        .action-btn.rename:hover { color: #007bff; }
        .action-btn.share:hover { color: #28a745; }
        .action-btn.pin:hover { color: #ffc107; }
        .action-btn.delete:hover { color: #dc3545; }

        .conversation-item.pinned {
            background: #fff3cd;
            border-left: 3px solid #ffc107;
        }

        /* Main Chat Area */
        .main-chat {
            margin-left: 280px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }

        .chat-header {
            background: white;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            color: #667eea;
            font-size: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 20px;
            animation: messageSlideIn 0.3s ease;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            position: relative;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .ai-badge {
            font-size: 10px;
            margin-top: 3px;
            opacity: 0.6;
        }

        /* Input Area */
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #ddd;
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.3);
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 10px;
            background: white;
            border-radius: 15px;
            width: fit-content;
            margin-bottom: 20px;
        }

        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            animation: slideUp 0.3s ease;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal-buttons button:first-child {
            background: #6c757d;
            color: white;
        }

        .modal-buttons button:last-child {
            background: #007bff;
            color: white;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 200;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-chat {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 201;
                background: #667eea;
                color: white;
                border: none;
                padding: 10px;
                border-radius: 5px;
                cursor: pointer;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h2 id="authTitle">Login to HealthBot AI</h2>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username" />
                <input type="password" id="loginPassword" placeholder="Password" />
                <button onclick="login()">Login</button>
                <div class="auth-switch">
                    Don't have an account? <a onclick="showRegister()">Register here</a>
                </div>
            </div>
            <div id="registerForm" style="display:none;">
                <input type="text" id="regUsername" placeholder="Username" />
                <input type="email" id="regEmail" placeholder="Email" />
                <input type="password" id="regPassword" placeholder="Password" />
                <input type="text" id="regFullName" placeholder="Full Name (optional)" />
                <button onclick="register()">Register</button>
                <div class="auth-switch">
                    <a onclick="showLogin()">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container" id="appContainer">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>💬 HealthBot AI</h3>
                <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
            </div>
            <div class="conversations-list" id="conversationsList">
                <!-- Conversations will be loaded here -->
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <h2 id="currentChatTitle">HealthBot AI Assistant</h2>
                <div class="user-info">
                    <span id="currentUsername"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="message bot">
                    <div class="message-content">
                        Hello! I'm HealthBot AI, your medical assistant. How can I help you today?
                        <div class="message-time" id="welcomeTime"></div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="typing-indicator" id="typingIndicator">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
                <div class="input-container">
                    <textarea class="message-input" id="messageInput" placeholder="Ask me anything about health..." rows="2"></textarea>
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Rename -->
    <div class="modal" id="renameModal">
        <div class="modal-content">
            <h3>Rename Conversation</h3>
            <input type="text" id="renameInput" placeholder="New name" />
            <div class="modal-buttons">
                <button onclick="closeModal()">Cancel</button>
                <button onclick="confirmRename()">Rename</button>
            </div>
        </div>
    </div>

    <script>
        let authToken = null;
        let currentUser = null;
        let currentConversationId = null;
        let conversations = [];
        let pendingAction = null;

        // API Base URL
        const API_URL = 'http://localhost:8000';

        // Display current time
        document.getElementById('welcomeTime').innerText = new Date().toLocaleTimeString();

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Send on Enter
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Register Functions
        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const full_name = document.getElementById('regFullName').value;

            if (!username || !email || !password) {
                alert('Please fill all required fields');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, full_name })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Registration successful! Please login.');
                    showLogin();
                } else {
                    alert('Registration failed: ' + data.detail);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                alert('Please enter username and password');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    authToken = data.access_token;
                    currentUser = data.username;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('username', currentUser);
                    
                    document.getElementById('currentUsername').innerText = currentUser;
                    document.getElementById('authContainer').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'block';
                    
                    await loadConversations();
                    if (conversations.length === 0) {
                        createNewChat();
                    } else {
                        selectConversation(conversations[0].id);
                    }
                } else {
                    alert('Login failed: ' + data.detail);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            localStorage.removeItem('username');
            localStorage.removeItem(`conversations_${currentUser}`);
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('authTitle').innerText = 'Register for HealthBot AI';
        }

        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('authTitle').innerText = 'Login to HealthBot AI';
        }

        // Conversation Management
        async function loadConversations() {
            const saved = localStorage.getItem(`conversations_${currentUser}`);
            if (saved) {
                conversations = JSON.parse(saved);
                renderConversations();
            }
        }

        function saveConversations() {
            localStorage.setItem(`conversations_${currentUser}`, JSON.stringify(conversations));
        }

        function renderConversations() {
            const container = document.getElementById('conversationsList');
            const sorted = [...conversations].sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return new Date(b.timestamp) - new Date(a.timestamp);
            });
            
            container.innerHTML = sorted.map(conv => `
                <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''} ${conv.pinned ? 'pinned' : ''}" 
                     onclick="selectConversation('${conv.id}')">
                    <div class="conversation-title">
                        <span>${escapeHtml(conv.title)}</span>
                    </div>
                    <div class="conversation-time">
                        ${formatTime(conv.timestamp)}
                    </div>
                    <div class="conversation-actions">
                        <button class="action-btn rename" onclick="event.stopPropagation(); showRenameModal('${conv.id}')">✏️</button>
                        <button class="action-btn share" onclick="event.stopPropagation(); shareConversation('${conv.id}')">📤</button>
                        <button class="action-btn pin" onclick="event.stopPropagation(); togglePin('${conv.id}')">📌</button>
                        <button class="action-btn delete" onclick="event.stopPropagation(); deleteConversation('${conv.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function createNewChat() {
            const newId = Date.now().toString();
            currentConversationId = newId;
            conversations.unshift({
                id: newId,
                title: 'New Conversation',
                messages: [],
                timestamp: new Date().toISOString(),
                pinned: false
            });
            saveConversations();
            renderConversations();
            
            // Clear messages
            document.getElementById('messagesArea').innerHTML = `
                <div class="message bot">
                    <div class="message-content">
                        Hello! I'm HealthBot AI, your medical assistant. How can I help you today?
                        <div class="message-time">${new Date().toLocaleTimeString()}</div>
                    </div>
                </div>
            `;
            document.getElementById('currentChatTitle').innerText = 'New Conversation';
        }

        function selectConversation(id) {
            currentConversationId = id;
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                document.getElementById('currentChatTitle').innerText = conv.title;
                
                // Load messages
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = '';
                
                if (conv.messages && conv.messages.length > 0) {
                    conv.messages.forEach(msg => {
                        addMessageToUI(msg.isUser ? 'user' : 'bot', msg.isUser ? msg.text : msg.response, msg.timestamp);
                    });
                } else {
                    messagesArea.innerHTML = `
                        <div class="message bot">
                            <div class="message-content">
                                Hello! I'm HealthBot AI, your medical assistant. How can I help you today?
                                <div class="message-time">${new Date().toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                }
                
                renderConversations();
            }
        }

        function showRenameModal(id) {
            pendingAction = { type: 'rename', id };
            document.getElementById('renameModal').style.display = 'flex';
            document.getElementById('renameInput').value = '';
        }

        function confirmRename() {
            const newName = document.getElementById('renameInput').value;
            if (pendingAction && newName) {
                const conv = conversations.find(c => c.id === pendingAction.id);
                if (conv) {
                    conv.title = newName;
                    saveConversations();
                    renderConversations();
                    if (currentConversationId === pendingAction.id) {
                        document.getElementById('currentChatTitle').innerText = newName;
                    }
                }
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('renameModal').style.display = 'none';
            pendingAction = null;
        }

        function togglePin(id) {
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                conv.pinned = !conv.pinned;
                saveConversations();
                renderConversations();
            }
        }

        function shareConversation(id) {
            const conv = conversations.find(c => c.id === id);
            if (conv && conv.messages) {
                const text = conv.messages.map(m => `${m.isUser ? '👤 User' : '🤖 HealthBot'}: ${m.isUser ? m.text : m.response}`).join('\n\n');
                navigator.clipboard.writeText(text);
                alert('✅ Conversation copied to clipboard!');
            } else {
                alert('No messages to share');
            }
        }

        function deleteConversation(id) {
            if (confirm('Are you sure you want to delete this conversation?')) {
                const index = conversations.findIndex(c => c.id === id);
                if (index !== -1) {
                    conversations.splice(index, 1);
                    saveConversations();
                    
                    if (currentConversationId === id) {
                        if (conversations.length > 0) {
                            selectConversation(conversations[0].id);
                        } else {
                            createNewChat();
                        }
                    }
                    renderConversations();
                }
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !authToken) return;
            
            // Add user message
            const timestamp = new Date().toISOString();
            addMessageToUI('user', message, timestamp);
            input.value = '';
            input.style.height = 'auto';
            
            // Show typing indicator
            document.getElementById('typingIndicator').style.display = 'block';
            
            // Save to current conversation
            const conv = conversations.find(c => c.id === currentConversationId);
            if (conv) {
                if (!conv.messages) conv.messages = [];
                conv.messages.push({ text: message, response: null, timestamp, isUser: true });
                if (conv.title === 'New Conversation' && conv.messages.length === 1) {
                    conv.title = message.substring(0, 30) + (message.length > 30 ? '...' : '');
                    document.getElementById('currentChatTitle').innerText = conv.title;
                }
                saveConversations();
                renderConversations();
            }
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ message, session_id: currentConversationId })
                });
                
                const data = await response.json();
                document.getElementById('typingIndicator').style.display = 'none';
                
                const responseTimestamp = new Date().toISOString();
                addMessageToUI('bot', data.response, responseTimestamp);
                
                if (conv) {
                    conv.messages[conv.messages.length - 1].response = data.response;
                    conv.messages[conv.messages.length - 1].responseTimestamp = responseTimestamp;
                    conv.timestamp = responseTimestamp;
                    saveConversations();
                    renderConversations();
                }
            } catch (error) {
                document.getElementById('typingIndicator').style.display = 'none';
                addMessageToUI('bot', 'Sorry, I encountered an error. Please try again.', new Date().toISOString());
            }
        }

        function addMessageToUI(role, content, timestamp) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(content)}
                    <div class="message-time">${new Date(timestamp).toLocaleTimeString()}</div>
                    ${role === 'bot' ? '<div class="ai-badge">🤖 AI Generated</div>' : ''}
                </div>
            `;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} min ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} hours ago`;
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check for saved session
        const savedToken = localStorage.getItem('authToken');
        const savedUsername = localStorage.getItem('username');
        if (savedToken && savedUsername) {
            authToken = savedToken;
            currentUser = savedUsername;
            document.getElementById('currentUsername').innerText = currentUser;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            loadConversations().then(() => {
                if (conversations.length === 0) {
                    createNewChat();
                } else {
                    selectConversation(conversations[0].id);
                }
            });
        }
    </script>
</body>
</html>

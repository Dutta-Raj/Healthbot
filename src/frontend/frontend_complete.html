<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot AI - Medical Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .auth-box {
            background: white;
            border-radius: 28px;
            padding: 40px;
            width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .auth-box h2 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
        }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .toggle-text { text-align: center; margin-top: 24px; color: #6b7280; }
        .toggle-text a { color: #667eea; cursor: pointer; }
        
        .app-container { display: flex; height: 100vh; }
        .sidebar {
            width: 300px;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            margin-top: 10px;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 20px;
        }
        .user-message { text-align: right; }
        .bot-message { text-align: left; }
        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
        }
        .user-message .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .bot-message .message-content {
            background: white;
            color: #333;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #ddd;
        }
        .input-container {
            display: flex;
            gap: 10px;
        }
        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            resize: none;
        }
        .send-btn {
            width: auto;
            padding: 12px 24px;
        }
        .logout-btn {
            background: #dc3545;
            width: auto;
            padding: 8px 16px;
        }
        .error-msg { color: red; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2>🏥 MediBot AI</h2>
            <div id="loginForm">
                <div class="input-group"><input type="text" id="loginUsername" placeholder="Username" value="ab"></div>
                <div class="input-group"><input type="password" id="loginPassword" placeholder="Password" value="ab123"></div>
                <button onclick="login()">Login</button>
                <div class="toggle-text">New here? <a onclick="showRegister()">Create an account</a></div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="input-group"><input type="text" id="regUsername" placeholder="Username"></div>
                <div class="input-group"><input type="email" id="regEmail" placeholder="Email"></div>
                <div class="input-group"><input type="password" id="regPassword" placeholder="Password"></div>
                <button onclick="register()">Register</button>
                <div class="toggle-text">Already have an account? <a onclick="showLogin()">Login here</a></div>
            </div>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <div id="appContainer" class="app-container" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>🏥 MediBot AI</h3>
                <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
            </div>
        </div>
        <div class="main-chat">
            <div class="chat-header">
                <h2 id="chatTitle">Medical Assistant</h2>
                <div><span id="username"></span> <button class="logout-btn" onclick="logout()">Logout</button></div>
            </div>
            <div class="messages-area" id="messages"></div>
            <div class="input-area">
                <div class="input-container">
                    <textarea class="message-input" id="messageInput" placeholder="Type your medical question here..." rows="2"></textarea>
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-detect API URL (works on localhost and Render)
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://healthbot.onrender.com';
        
        console.log('API_URL:', API_URL);
        
        let token = null, user = null, currentSession = null;

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (res.ok) { 
                    alert('Registration successful! Please login.'); 
                    showLogin(); 
                } else { 
                    showError(data.detail || 'Registration failed'); 
                }
            } catch(e) { showError('Error: ' + e.message); }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    user = data.username;
                    localStorage.setItem('token', token);
                    document.getElementById('username').innerText = user;
                    document.getElementById('authContainer').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'flex';
                    newChat();
                } else { 
                    showError(data.detail || 'Invalid credentials'); 
                }
            } catch(e) { showError('Error: ' + e.message); }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        function newChat() {
            currentSession = 's_' + Date.now();
            document.getElementById('messages').innerHTML = '';
            addMessage('bot', 'Hello! I\'m MediBot AI. How can I help you today?');
        }

        async function sendMessage() {
            let input = document.getElementById('messageInput');
            let msg = input.value.trim();
            if (!msg) return;
            addMessage('user', msg);
            input.value = '';
            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: msg, session_id: currentSession })
                });
                const data = await res.json();
                addMessage('bot', data.response);
            } catch(e) { addMessage('bot', 'Error: ' + e.message); }
        }

        function addMessage(role, text) {
            let container = document.getElementById('messages');
            let div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
            div.innerHTML = `<div class="message-content">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        let savedToken = localStorage.getItem('token');
        if(savedToken) { 
            token = savedToken; 
            document.getElementById('authContainer').style.display = 'none'; 
            document.getElementById('appContainer').style.display = 'flex'; 
            newChat(); 
        }
    </script>
</body>
</html>
